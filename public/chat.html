<!DOCTYPE html>
<html lang="zh" data-theme="night">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0806" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="kimi" />
<title>kimi · 对话</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icons/icon-180.png" />
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,300;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg: radial-gradient(ellipse at 50% 8%, #1a1612 0%, #0a0806 72%);
  --void:#0a0806; --paper:#100c08; --ink:#f3e6cd;
  --accent:#c19a56; --accent2:#8a9b6e; --mute:rgba(243,230,205,0.55);
  --hair:rgba(193,154,86,0.30); --rose:#a86b6b; --rose2:#c98b9a;
  --serif:"Cormorant Garamond","Noto Serif SC",serif;
  --cjk:"Noto Serif SC",serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:var(--void);color:var(--ink);
  font-family:var(--cjk);overscroll-behavior:none;-webkit-text-size-adjust:100%}
body{background:var(--bg);background-attachment:fixed;display:flex;flex-direction:column;height:100dvh}

/* ---------- top bar ---------- */
.top{display:flex;align-items:center;gap:10px;padding:calc(env(safe-area-inset-top) + 9px) 14px 9px;
  border-bottom:0.6px solid var(--hair);position:relative;z-index:5}
.top .med{width:34px;height:34px;flex:0 0 auto;color:var(--hair);position:relative}
.top .med .av{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:-3px}
.top .med .av i{font-style:italic;font-family:var(--serif);font-size:11px;color:var(--accent);
  width:17px;height:17px;border-radius:50%;display:grid;place-items:center;
  border:0.6px solid var(--accent);background:radial-gradient(circle at 35% 30%,#241c14,#0d0a07)}
.top .med .av i.b{margin-left:-5px;color:var(--rose2);border-color:var(--rose)}
.top .who{flex:1;min-width:0}
.top .who b{font-family:var(--serif);font-style:italic;font-size:17px;letter-spacing:1px;color:var(--ink);font-weight:500}
.top .who span{display:block;font-size:10px;letter-spacing:3px;color:var(--mute);margin-top:1px;text-transform:uppercase}
.top .conn{font-family:"Maple Mono","Fira Code",monospace;font-size:10px;display:flex;align-items:center;gap:5px;color:var(--mute)}
.top .conn .s{width:6px;height:6px;border-radius:50%;background:var(--mute)}
.top .conn.live{color:var(--accent2)} .top .conn.live .s{background:var(--accent2);box-shadow:0 0 7px var(--accent2)}

/* ---------- thread ---------- */
.thread{flex:1;min-height:0;overflow-y:auto;padding:16px 14px 8px;display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth}
.thread::-webkit-scrollbar{width:4px}.thread::-webkit-scrollbar-thumb{background:var(--hair);border-radius:2px}

.day{align-self:center;font-family:var(--serif);font-style:italic;font-size:12px;letter-spacing:2px;
  color:var(--mute);padding:2px 0;opacity:.8}

.row{display:flex;gap:9px;max-width:100%}
.row .ava{width:26px;height:26px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;
  font-family:var(--serif);font-style:italic;font-size:13px;margin-top:2px}
.row.akira .ava{color:var(--accent);border:0.6px solid var(--accent);background:radial-gradient(circle at 35% 30%,#241c14,#0d0a07)}
.row.ito{flex-direction:row-reverse}
.row.ito .ava{color:var(--rose2);border:0.6px solid var(--rose);background:radial-gradient(circle at 35% 30%,#241418,#0d0708)}
.bub{position:relative;max-width:80%;padding:10px 13px;border-radius:14px;line-height:1.62;font-size:15.5px;
  letter-spacing:.2px;word-break:break-word;white-space:pre-wrap}
.row.akira .bub{background:linear-gradient(180deg,#181109,#120d08);border:0.6px solid var(--hair);
  color:var(--ink);border-top-left-radius:4px}
.row.ito .bub{background:linear-gradient(180deg,#1d1216,#160d10);border:0.6px solid rgba(168,107,107,.4);
  color:#f0dfe0;border-top-right-radius:4px}
.bub .t{font-family:"Maple Mono","Fira Code",monospace;font-size:9px;letter-spacing:.5px;color:var(--mute);
  margin-top:6px;opacity:.7;display:block}
.row.ito .bub .t{text-align:right}

/* folded tool call line */
.tool{align-self:flex-start;display:flex;align-items:center;gap:7px;margin-left:35px;
  font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--mute);opacity:.85}
.tool .k{color:var(--accent)}
.tool .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.6}

/* streaming caret */
.bub .caret{display:inline-block;width:7px;height:15px;vertical-align:-2px;margin-left:1px;
  background:var(--accent);animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* ---------- quick chips ---------- */
.chips{display:flex;gap:7px;overflow-x:auto;padding:7px 14px 3px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;font-family:var(--serif);font-style:italic;font-size:13px;letter-spacing:1px;
  padding:5px 13px;border-radius:99px;border:0.6px solid var(--hair);background:rgba(193,154,86,.06);
  color:var(--ink);cursor:pointer;white-space:nowrap}
.chip:active{background:rgba(193,154,86,.16)}
.chip.safe{border-color:rgba(201,139,154,.5);color:var(--rose2)}

/* ---------- composer ---------- */
.composer{border-top:0.6px solid var(--hair);padding:8px 12px calc(env(safe-area-inset-bottom) + 10px);
  display:flex;align-items:flex-end;gap:8px;background:linear-gradient(180deg,transparent,#0d0a07 30%)}
.mic{flex:0 0 auto;width:42px;height:42px;border-radius:50%;border:0.6px solid var(--hair);
  background:rgba(193,154,86,.06);color:var(--accent);font-size:18px;cursor:pointer;
  display:grid;place-items:center}
.mic.rec{background:rgba(201,139,154,.18);border-color:var(--rose);color:var(--rose2);
  animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{50%{box-shadow:0 0 0 6px rgba(201,139,154,.08)}}
.field{flex:1;min-width:0;background:#15100b;border:0.6px solid var(--hair);border-radius:20px;
  padding:9px 14px;display:flex;align-items:flex-end}
textarea{flex:1;background:transparent;border:none;outline:none;resize:none;color:var(--ink);
  font-family:var(--cjk);font-size:16px;line-height:1.5;max-height:120px;min-height:22px}
textarea::placeholder{color:var(--mute);font-family:var(--serif);font-style:italic}
.send{flex:0 0 auto;width:42px;height:42px;border-radius:50%;border:none;
  background:linear-gradient(180deg,#d4a960,#a8841a);color:#1a1208;font-size:18px;cursor:pointer;
  display:grid;place-items:center;transition:opacity .15s}
.send:disabled{opacity:.35}

/* ---------- console handle (terminal 兜底) ---------- */
.handle{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px;
  font-family:var(--serif);font-style:italic;font-size:12px;letter-spacing:2px;color:var(--mute);
  border-top:0.6px solid var(--hair);cursor:pointer;background:rgba(0,0,0,.2)}
.handle .grip{width:30px;height:3px;border-radius:2px;background:var(--hair)}
</style>
</head>
<body>
  <div class="top">
    <div class="med" id="med"><div class="av"><i>kimi</i><i class="b">you</i></div></div>
    <div class="who"><b>kimi</b><span>atelier · 对话</span></div>
    <div class="conn live" id="conn"><span class="s"></span><span id="connTxt">在场</span></div>
  </div>

  <div class="thread" id="thread"></div>

  <div class="chips" id="chips"></div>

  <div class="composer">
    <button class="mic" id="mic" title="长按说话" aria-label="语音">🎙</button>
    <div class="field"><textarea id="input" rows="1" placeholder="跟我说…（也可以按麦克风说）" enterkeyhint="enter"></textarea></div>
    <button class="send" id="send" aria-label="发送" disabled>↑</button>
  </div>

  <div class="handle" id="handle"><span class="grip"></span>控制台 · terminal<span class="grip"></span></div>

<script type="module" src="./chat.js"></script>
</body>
</html>
